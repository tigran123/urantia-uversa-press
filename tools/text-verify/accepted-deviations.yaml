# Intentional deviations between the Uversa Press LaTeX edition and the
# authoritative SRT HTML. Each entry whitelists a known difference. The
# verifier accepts the listed verse(s) and does not flag them as defects.
#
# Schema — two top-level key forms:
#   PAPER:SECTION:VERSE:          # single verse
#     skip: true                  # don't compare this verse at all
#     ignore_italics: true        # compare text strictly, skip italic-span check
#     reason: "human-readable explanation"
#
#   PAPER:SECTION:V1-V2:          # inclusive range, V1 <= V2 (fans out to N entries)
#     skip: true                  # applies to every verse in the range
#     reason: "shared rationale for the whole range"
#
# Add entries only after human review confirms the deviation is intentional.
# Every entry should cite either:
#   - the SRT canonical source (e.g., SRT 2010 edition convention)
#   - a typographic decision by the Uversa Press editor
#   - or a documented LaTeX-edition source disagreement to be fixed later

0:12:10:
  skip: true
  reason: "p000 12:10 ACKNOWLEDGMENT: TeX has all-caps 'ACKNOWLEDGMENT' (rendered as visually prominent block centered on the page); SRT HTML stores 'Acknowledgment' in title case wrapped in <em> and tagged with id suffix 'F' (floater class). Both represent the same word; the casing is a typographic stylistic difference."

58:1:7:
  skip: true
  reason: "p058 1:7 TEX='…has a marine origin, the ideal conditions…' vs SRT='…has a marine origin the ideal conditions…' (no comma). The TeX body carries the authoritative SRT reading (with comma); the html files distributed under the SRT name happen to lack the comma at this spot — a defect in those particular html files, not in the SRT proper. Separately, the TeX side documents the 1955 First Edition's reading at this verse via the editorial \\fnc{origin the} footnote (the 1955 First Edition of The Urantia Book also lacked the comma here, and all such First-Edition deviations are preserved as \\fnc{} footnotes as a matter of historical record). Continuing to call the html side 'SRT' in the verifier's labels, but recording here that for this specific verse the html departs from the real SRT."

24:0:1:
  skip: true
  reason: "p024 0:1 TEX='On Uversa' vs SRT='ON UVERSA'. The lettrine in the printed book is just the single capital 'O' of 'On'; the typographic convention is to extend small-caps around the lettrine to give it visual weight, and because 'On' is too short to carry that weight alone the following word 'Uversa' gets pulled into the small-caps span — yielding the printed 'O​N UVERSA'. The SRT compiler encoded this as literal ALL-CAPS 'ON UVERSA we divide…', not realizing it is a purely typographic decoration. TeX is correct. Do NOT generalize — other leading-caps papers must be reviewed individually."

74:0:1:
  skip: true
  reason: "p074 0:1 TEX='Adam and Eve' vs SRT='ADAM AND EVE'. The lettrine in the printed book is just the single capital 'A' of 'Adam'; the typographic convention is to extend small-caps around the lettrine to give it visual weight. Do NOT generalize — other leading-caps papers must be reviewed individually."

95:0:1:
  skip: true
  reason: "p095 0:1 TEX='As India' vs SRT='AS INDIA'. The lettrine in the printed book is just the single capital 'A' of 'As'; the typographic convention is to extend small-caps around the lettrine to give it visual weight. Do NOT generalize — other leading-caps papers must be reviewed individually."

119:8:9:
  skip: true
  reason: "p119 8:9 TEX='This Paper, depicting ... of Urantia time.' vs SRT='[This Paper, depicting ... of Urantia time.]'. The square brackets in the html version of SRT match the reading of 1955 First Edition, but the actual SRT is our TeX reading."

127:0:1:
  skip: true
  reason: "p127 0:1 TEX='As Jesus' vs SRT='AS JESUS'. The same issue of capitalising words near lettrine as in 24:0.1, etc."

128:0:1:
  skip: true
  reason: "p128 0:1 TEX='As Jesus' vs SRT='AS JESUS'. The same issue of capitalising words near lettrine as in 24:0.1, etc."

140:10:1:
  ignore_italics: true
  reason: "p140 10:1 italic-boundary disagreement: SRT extends the italic <em> span to include the leading opening curly quote (e.g. italic span covers '“Be' at the quotation '“Be you therefore perfect…'); TeX places the italic markers tightly around 'Be' only, leaving the '“' upright. The text is identical on both sides. The TeX choice is preferred typographically: italicising punctuation around an emphasised word makes the opening curly quote lean/slant in a way that visually disconnects it from the upright closing quote. Text comparison remains strict (the schema's ignore_italics suppresses only the italic-span comparison)."

# p134 6:14..6:17: the SRT enumerates the '* * *' separator (SRT 6:14 = '* * *')
# as a real verse, then numbers the three real text paragraphs that follow it
# 6:15, 6:16, 6:17. Our TeX edition renders the separator as \separatorshort
# (no verse number), so TeX 6:14, 6:15, 6:16 carry the same content as SRT 6:15,
# 6:16, 6:17 respectively. Skipping all four affected keys silences the resulting
# cascading TEXT diffs at 6:14/6:15/6:16 and the only-in-SRT STRUCT at 6:17.
134:6:14:
  skip: true
  reason: "p134 6:14: SRT verse is the '* * *' separator (corresponds to \\separatorshort in our TeX, which we do not enumerate). See note above 134:6:14 entry."
134:6:15:

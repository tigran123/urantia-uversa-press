144:5:11-108:
  skip: true
  reason: "p144 5:11-108: cascading shift caused by the 6 SRT '* * *' separators (\\separatorshort in TeX) at SRT 5:11, 5:25, 5:38, 5:54, 5:73, 5:87. TeX numbering skips the separators; SRT numbers each one as a verse. So TeX 5:N = SRT 5:(N + number-of-separators-passed). Spot-verified: TeX 5:11 = SRT 5:12 ('Our creative Parent…'), TeX 5:50 = SRT 5:53 ('Even so, not our will…'), TeX 5:102 = SRT 5:108 ('Though the apostles…'). Zero real text defects remain after this cascade is suppressed. The range covers both the TEXT diffs at 5:11..5:102 (in `common`) and the SRT-only STRUCT diffs at 5:103..5:108 (suppressed via the same skip semantic added when handling p134)."

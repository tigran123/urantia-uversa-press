  reason: "p134 6:15: cascading shift from SRT enumerating the '* * *' separator one verse earlier. TeX 6:14 (After the death of Cymboyton…) = SRT 6:15."
134:6:16:
  skip: true
  reason: "p134 6:16: cascading shift from SRT enumerating the '* * *' separator. TeX 6:15 (Cymboyton's eldest son…) = SRT 6:16."
